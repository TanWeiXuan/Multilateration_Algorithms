name: Build and Run C++

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
      
    - name: Set up C++ environment
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++
        
    - name: Configure CMake
      run: cmake -S . -B build -DMULTILAT_BUILD_CLI=ON -DMULTILAT_BUILD_WEBAPP=OFF
        
    - name: Build
      run: cmake --build build --config Release --target main
        
    - name: Run executable
      run: ./build/bin/main

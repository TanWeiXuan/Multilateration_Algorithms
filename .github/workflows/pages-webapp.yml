name: pages-webapp

on:
  push:
    branches: [pages]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Debug rlimgui checkout
        run: |
          echo "Listing external/rlimgui files"
          find external/rlimgui -maxdepth 2 -type f | sort

      - name: Configure
        run: emcmake cmake -S . -B build-web -DMULTILAT_BUILD_WEBAPP=ON -DMULTILAT_BUILD_CLI=OFF

      - name: Build target list (debug)
        run: cmake --build build-web --target help

      - name: Build
        run: cmake --build build-web --config Release --target multilat_web

      - name: Debug generated web artifacts
        run: |
          echo "Generated web artifacts under build-web:"
          find build-web -type f \( -name '*.html' -o -name '*.js' -o -name '*.wasm' \) -not -path '*/CMakeFiles/*' | sort

      - name: Stage pages artifact
        run: |
          rm -rf dist-pages
          mkdir -p dist-pages

          artifact_dir="$(dirname "$(find build-web -type f -name index.html -not -path '*/CMakeFiles/*' -print -quit)")"
          if [ -z "${artifact_dir}" ] || [ ! -f "${artifact_dir}/index.html" ]; then
            echo "Could not locate web artifact index.html under build-web"
            find build-web -maxdepth 4 -type f | sort
            exit 1
          fi

          cp "${artifact_dir}/"*.html dist-pages/
          cp "${artifact_dir}/"*.js dist-pages/
          cp "${artifact_dir}/"*.wasm dist-pages/

          if [ ! -f dist-pages/index.html ]; then
            echo "Missing required dist-pages/index.html after staging."
            echo "Contents of dist-pages:"
            find dist-pages -maxdepth 2 -type f | sort
            exit 1
          fi

          touch dist-pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

name: pages-webapp

on:
  push:
    branches: [pages]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Configure
        run: emcmake cmake -S . -B build-web -DMULTILAT_BUILD_WEBAPP=ON -DMULTILAT_BUILD_CLI=OFF

      - name: Build
        run: cmake --build build-web --config Release

      - name: Stage pages artifact
        run: |
          rm -rf dist-pages
          mkdir -p dist-pages

          artifact_dir="$(dirname "$(find build-web -type f -name index.html -not -path '*/CMakeFiles/*' -print -quit)")"
          if [ -z "${artifact_dir}" ] || [ ! -f "${artifact_dir}/index.html" ]; then
            echo "Could not locate web artifact index.html under build-web"
            find build-web -maxdepth 4 -type f | sort
            exit 1
          fi

          cp "${artifact_dir}/index.html" dist-pages/index.html
          cp "${artifact_dir}/index.js" dist-pages/index.js
          cp "${artifact_dir}/index.wasm" dist-pages/index.wasm
          touch dist-pages/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist-pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
